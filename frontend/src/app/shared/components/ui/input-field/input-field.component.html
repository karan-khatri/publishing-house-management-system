<div class="">
  <label class="block text-sm font-medium text-gray-700 mb-2">{{ label }}</label>


  <!-- Textarea -->
  @if (textarea) {
  <textarea [rows]="rows" [placeholder]="placeholder" (input)="onValueChange($event)"
    class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 focus:outline-none block w-full p-2.5">{{ value }}</textarea>
  } @else {
  <!-- Input -->
  <input [type]="type" [placeholder]="placeholder" [value]="value" (input)="onValueChange($event)"
    class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 focus:outline-none block w-full p-2.5" />
  }
</div>
