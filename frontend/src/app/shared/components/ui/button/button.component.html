<button
  [type]="type"
  [class]="buttonClasses"
  [disabled]="disabled || loading"
  (click)="onClick($event)"
>
  @if (loading) {
    <span
      class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin mr-2"
    ></span>
  }
  <span [class.opacity-70]="loading">
    <ng-content></ng-content>
  </span>
</button>
