<div class="flex flex-col gap-1 w-full" [class]="extraClasses">
  <!-- Label -->
  @if (label) {
  <label class="block text-sm font-medium text-gray-700">
    {{ label }}
    @if (required) {
    <span class="text-red-500">*</span>
    }
  </label>
  }

  <!-- Select -->
  <select class="{{ selectClasses }}" [disabled]="disabled" (change)="onSelectChange($event)"
    (blur)="onSelectBlur()" (focus)="onSelectFocus()">
    @for (option of options; track option.value) {
    <option [value]="option.value" [selected]="option.value == value" [disabled]="option.disabled">
      {{ option.label }}
    </option>
    }
  </select>

  <!-- Error -->
  @if (shouldShowError && currentErrorMessage) {
  <div class="text-xs text-red-600">
    {{ currentErrorMessage }}
  </div>
  }

  <!-- Helper -->
  @if (helperText && (!shouldShowError || !currentErrorMessage)) {
  <div class="text-xs text-gray-500">
    {{ helperText }}
  </div>
  }
</div>
