<div class="min-h-screen flex items-center justify-center bg-gray-100 p-5">
  <div class="bg-white p-10 rounded-lg shadow-md w-full max-w-md">
    <!-- Header -->
    <div class="text-center mb-8">
      <h1 class="text-2xl font-medium text-gray-800 mb-2">Welcome Back</h1>
      <p class="text-sm text-gray-600">Sign in to your Publishing House account</p>
    </div>

    <!-- Form -->
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-5">
      <app-form-input-field label="Email Address" type="email" placeholder="Enter email address" formControlName="email"
        [required]="true" [control]="loginForm.get('email')" extraClasses="mb-2" />

      <app-form-input-field label="Password" type="password" placeholder="Enter your password"
        formControlName="password" [required]="true" [control]="loginForm.get('password')" extraClasses="mb-2" />

      <app-button type="submit" variant="primary" size="md" [fullWidth]="true" [loading]="isLoading"
        [disabled]="!loginForm.valid">
        Sign In
      </app-button>
    </form>
  </div>
</div>
